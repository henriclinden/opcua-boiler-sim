name: boilersim

services:

  boiler-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: boiler-simulator:latest
    container_name: boiler-simulator
    restart: unless-stopped
    ports:
      - "4840:4840"

    environment:
      # Python log level: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost', 4840), timeout=5); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
